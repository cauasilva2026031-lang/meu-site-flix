<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaxxFlix</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>

    <div class="logo">
        MaxxFlix
    </div>

    <nav>

        <a href="#">Início</a>
        <a href="#">Filmes</a>
        <a href="#">Séries</a>
        <a href="#">Minha Lista</a>

    </nav>

    <div class="pesquisa">

        <input
            type="text"
            id="campoBusca"
            placeholder="Pesquisar filmes ou séries..."
        >

    </div>

</header>

<section id="banner">

    <div class="banner-info">

        <h1 id="bannerTitulo">
            Carregando...
        </h1>

        <p id="bannerDescricao">
            Aguarde...
        </p>

        <div class="botoes">

            <button id="assistir">
                ▶ Assistir Trailer
            </button>

            <button id="detalhes">
                Mais Informações
            </button>

        </div>

    </div>

</section>

<main>

    <section>

        <h2>🔥 Em Alta</h2>

        <div class="carrossel" id="trending">

        </div>

    </section>

    <section>

        <h2>🎬 Filmes Populares</h2>

        <div class="carrossel" id="popular">

        </div>

    </section>

    <section>

        <h2>⭐ Melhor Avaliados</h2>

        <div class="carrossel" id="topRated">

        </div>

    </section>

    <section>

        <h2>📺 Séries Populares</h2>

        <div class="carrossel" id="series">

        </div>

    </section>

    <section id="resultadoBusca" style="display:none;">

        <h2>Resultados</h2>

        <div class="carrossel" id="busca">

        </div>

    </section>

</main>

<footer>

    <p>
        MaxxFlix © 2026
    </p>

    <p>
        Catálogo fornecido pela API oficial do TMDB.
    </p>

</footer>

<script src="js/api.js"></script>
<script src="js/app.js"></script>

</body>
</html>
