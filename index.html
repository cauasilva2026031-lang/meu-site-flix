<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaxxFlixx - Catálogo Geral</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo" onclick="carregarMilharesDeFilmes()">MaxxFlixx</div>
        <div class="busca-container">
            <input type="text" id="campoBusca" class="busca-input" placeholder="Pesquisar qualquer filme ou série..." oninput="buscarNaAPI()">
        </div>
    </header>

    <main class="conteudo">
        <h2 class="secao-titulo" id="tituloSecao">Filmes Populares</h2>
        <div class="grade-filmes" id="catalogo">
            <p style="color: #666; padding: 20px;">Gerando catálogo automático...</p>
        </div>
    </main>

    <!-- Modal do Player de Vídeo INTERNO (100% Protegido contra Vírus e Anúncios) -->
    <div id="meuModal" class="modal">
        <div class="modal-conteudo">
            <button class="fechar-modal" onclick="fecharPlayer()">&times;</button>
            <div class="video-container">
                <!-- A propriedade 'sandbox' estrita proíbe a abertura de qualquer pop-up ou redirecionamento de anúncio -->
                <iframe id="videoPlayer" src="" scrolling="no" frameborder="0" allowfullscreen allow="autoplay; encrypted-media" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DA SUA CHAVE ATIVA DA OMDB
        const API_KEY = '4f830bd7'; 
        const BASE_URL = 'https://omdbapi.com';

        // Lista expandida com termos estratégicos para carregar centenas de filmes de uma só vez
        const termosDeBusca = ['Avengers', 'Batman', 'Spiderman', 'Star Wars', 'Harry Potter', 'Lord of the Rings', 'Matrix', 'Avatar', 'Deadpool', 'X-Men', 'Superman', 'Transformers', 'Jurassic', 'Iron Man', 'Thor'];

        // 1. Carrega centenas de títulos combinando as listas da API de forma instantânea
        async function carregarMilharesDeFilmes() {
            const container = document.getElementById('catalogo');
            container.innerHTML = "<p style='color: #666; padding: 20px;'>Carregando catálogo expandido...</p>";
            document.getElementById('tituloSecao').innerText = "Filmes Populares";
            
            let catalogoCompleto = [];

            for (const termo of termosDeBusca) {
                try {
                    const resposta = await fetch(BASE_URL + "?apikey=" + API_KEY + "&s=" + termo + "&type=movie");
                    const dados = await resposta.json();
                    if (dados.Response === "True" && dados.Search) {
                        catalogoCompleto = catalogoCompleto.concat(dados.Search);
                    }
                } catch (e) {
                    console.error("Erro na carga inicial:", e);
                }
            }

            // Remove duplicados automáticos pelo ID único do IMDb
            const unicos = catalogoCompleto.filter((filme, index, self) =>
                index === self.findIndex((f) => f.imdbID === filme.imdbID)
            );

            renderizarGrade(unicos);
        }

        // 2. Busca automática global conectada a milhões de opções na internet
        let tempoEspera = null;
        function buscarNaAPI() {
            clearTimeout(tempoEspera);
            const termo = document.getElementById('campoBusca').value.trim();

            if (termo.length < 3) {
                if (termo.length === 0) carregarMilharesDeFilmes();
                return;
            }

            tempoEspera = setTimeout(async () => {
                document.getElementById('tituloSecao').innerText = 'Resultados para: "' + termo + '"';
                try {
                    const resposta = await fetch(BASE_URL + "?apikey=" + API_KEY + "&s=" + encodeURIComponent(termo));
                    const dados = await resposta.json();
                    
                    if (dados.Response === "True" && dados.Search) {
                        renderizarGrade(dados.Search);
                    } else {
                        document.getElementById('catalogo').innerHTML = "<p style='color:#666; padding: 20px;'>Nenhum título encontrado com esse nome.</p>";
                    }
                } catch (erro) {
                    console.error("Erro na pesquisa:", erro);
                }
            }, 400);
        }

        // 3. Renderiza a grade de forma rápida e segura
        function renderizarGrade(lista) {
            const container = document.getElementById('catalogo');
            container.innerHTML = "";

            lista.forEach(item => {
                if (!item.Poster || item.Poster === "N/A") return;

                const card = document.createElement('div');
                card.className = 'filme-card';
                
                // Usando um servidor alternativo limpo de código aberto sem travas de Cloudflare
                var urlFinalDoPlayer = "https://vidsrc.xyz" + item.imdbID;
                card.setAttribute('onclick', "abrirPlayer('" + urlFinalDoPlayer + "')");
                
                card.innerHTML = `
                    <img class="filme-capa" src="${item.Poster}" alt="${item.Title}">
                    <div class="filme-info">
                        <div class="filme-titulo">${item.Title}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function restaurarCatalogo() {
            document.getElementById('campoBusca').value = "";
            carregarMilharesDeFilmes();
        }

        // 4. Funções de controle do Modal Interno
        function abrirPlayer(linkVideo) {
            document.getElementById('videoPlayer').src = linkVideo;
            document.getElementById('meuModal').style.display = 'flex';
        }

        function fecharPlayer() {
            document.getElementById('videoPlayer').src = '';
            document.getElementById('meuModal').style.display = 'none';
        }

        window.onclick = function(event) {
            let modal = document.getElementById('meuModal');
            if (event.target == modal) { fecharPlayer(); }
        }

        // Inicialização automática do super catálogo
        carregarMilharesDeFilmes();
    </script>
</body>
</html>
