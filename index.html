<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaxxFlixx - Catálogo Completo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">MaxxFlixx</div>
        <div class="busca-container">
            <input type="text" id="campoBusca" class="busca-input" placeholder="Pesquisar filme ou série..." oninput="filtrarFilmes()">
        </div>
    </header>

    <main class="conteudo">
        <h2 class="secao-titulo">Filmes no Catálogo</h2>
        <div class="grade-filmes" id="catalogo">
            <!-- Os cards serão criados aqui automaticamente -->
        </div>
    </main>

    <!-- Modal do Player (Configurado para Filmes e Séries Externos) -->
    <div id="meuModal" class="modal">
        <div class="modal-conteudo">
            <button class="fechar-modal" onclick="fecharPlayer()">&times;</button>
            <div class="video-container">
                <!-- Parâmetros 'sandbox' e 'allow' ajudam a segurar o excesso de anúncios agressivos -->
                <iframe id="videoPlayer" src="" scrolling="no" frameborder="0" allowfullscreen allow="autoplay; encrypted-media" sandbox="allow-scripts opacity allow-same-origin allow-forms allow-pointer-lock"></iframe>
            </div>
        </div>
    </div>

    <script>
        // LISTA DE FILMES VIA API DE STREAMING
        // Se for filme: use 'filme/ID' | Se for série: use 'serie/ID'
        const meusFilmes = [
            {
                titulo: "Deadpool & Wolverine",
                capa: "https://tmdb.org",
                playerUrl: "https://superflixapi.dev"
            },
            {
                titulo: "Divertida Mente 2",
                capa: "https://tmdb.org",
                playerUrl: "https://superflixapi.dev"
            },
            {
                titulo: "Interestelar",
                capa: "https://tmdb.org",
                playerUrl: "https://superflixapi.dev"
            },
            {
                titulo: "The Boys (Série)",
                capa: "https://tmdb.org",
                playerUrl: "https://superflixapi.dev"
            }
        ];

        function carregarCatalogo(listaDeFilmes) {
            const container = document.getElementById('catalogo');
            container.innerHTML = "";

            if(listaDeFilmes.length === 0) {
                container.innerHTML = "<p style='color:#666; padding: 20px;'>Nenhum título encontrado.</p>";
                return;
            }

            listaDeFilmes.forEach(filme => {
                const card = document.createElement('div');
                card.className = 'filme-card';
                card.setAttribute('onclick', `abrirPlayer('${filme.playerUrl}')`);
                card.innerHTML = `
                    <img class="filme-capa" src="${filme.capa}" alt="${filme.titulo}">
                    <div class="filme-info">
                        <div class="filme-titulo">${filme.titulo}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filtrarFilmes() {
            const termoBusca = document.getElementById('campoBusca').value.toLowerCase();
            const filmesFiltrados = meusFilmes.filter(filme => 
                filme.titulo.toLowerCase().includes(termoBusca)
            );
            carregarCatalogo(filmesFiltrados);
        }

        function abrirPlayer(linkVideo) {
            document.getElementById('videoPlayer').src = linkVideo;
            document.getElementById('meuModal').style.display = 'flex';
        }

        function fecharPlayer() {
            document.getElementById('videoPlayer').src = '';
            document.getElementById('meuModal').style.display = 'none';
        }

        window.onclick = function(event) {
            let modal = document.getElementById('meuModal');
            if (event.target == modal) { fecharPlayer(); }
        }

        // Inicia o site carregando os dados
        carregarCatalogo(meusFilmes);
    </script>
</body>
</html>
