<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaxxFlixx - Catálogo Inteligente OMDb</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo" onclick="restaurarCatalogo()">MaxxFlixx</div>
        <div class="busca-container">
            <input type="text" id="campoBusca" class="busca-input" placeholder="Pesquisar filme (Ex: Avengers, Batman)..." oninput="buscarFilmesOMDb()">
        </div>
    </header>

    <main class="conteudo">
        <h2 class="secao-titulo" id="tituloSecao">Filmes Disponíveis</h2>
        <div class="grade-filmes" id="catalogo">
            <!-- Os cards serão criados aqui dinamicamente -->
        </div>
    </main>

    <!-- Modal do Player de Vídeo INTERNO -->
    <div id="meuModal" class="modal">
        <div class="modal-conteudo">
            <button class="fechar-modal" onclick="fecharPlayer()">&times;</button>
            <div class="video-container">
                <!-- Sandbox ajustado para liberar a execução interna da API Warez -->
                <iframe id="videoPlayer" src="" scrolling="no" frameborder="0" allowfullscreen allow="autoplay; encrypted-media" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES DA OMDB API
        const OMDB_API_KEY = 'cleardata'; // Chave pública padrão para demonstração
        const OMDB_BASE_URL = 'https://www.omdbapi.com/';

        // Lista de termos iniciais para popular a página inicial se a busca estiver vazia
        const termosIniciais = ['Avengers', 'Batman', 'Interstellar', 'Deadpool', 'Spiderman', 'Inside Out'];

        // 1. Carrega os filmes iniciais buscando os termos na OMDb API
        async function carregarFilmesIniciais() {
            const container = document.getElementById('catalogo');
            container.innerHTML = "<p style='color: #666; padding: 20px;'>Carregando catálogo...</p>";
            
            let todosOsFilmes = [];
            
            for (const termo of termosIniciais) {
                try {
                    const resposta = await fetch(`${OMDB_BASE_URL}?apikey=${OMDB_API_KEY}&t=${termo}`);
                    const filme = await resposta.json();
                    if (filme.Response === "True" && filme.Poster !== "N/A") {
                        todosOsFilmes.push(filme);
                    }
                } catch (e) {
                    console.error("Erro ao puxar filme inicial:", e);
                }
            }
            renderizarFilmes(todosOsFilmes);
        }

        // 2. Busca automática em tempo real ao digitar na barra de pesquisa
        let timeoutBusca = null;
        function buscarFilmesOMDb() {
            clearTimeout(timeoutBusca);
            const termo = document.getElementById('campoBusca').value.trim();

            if (termo.length < 3) {
                if (termo.length === 0) carregarFilmesIniciais();
                return;
            }

            // Aguarda o usuário parar de digitar por 500ms antes de chamar a API (Evita travamentos)
            timeoutBusca = setTimeout(async () => {
                document.getElementById('tituloSecao').innerText = `Resultados para: "${termo}"`;
                try {
                    const resposta = await fetch(`${OMDB_BASE_URL}?apikey=${OMDB_API_KEY}&s=${encodeURIComponent(termo)}&type=movie`);
                    const dados = await resposta.json();
                    
                    if (dados.Response === "True") {
                        renderizarFilmes(dados.Search);
                    } else {
                        document.getElementById('catalogo').innerHTML = "<p style='color:#666; padding: 20px;'>Nenhum filme encontrado.</p>";
                    }
                } catch (erro) {
                    console.error("Erro na busca:", erro);
                }
            }, 500);
        }

        // 3. Monta e renderiza os cards com as capas oficiais retornadas pela OMDb
        function renderizarFilmes(listaFilmes) {
            const container = document.getElementById('catalogo');
            container.innerHTML = "";

            listaFilmes.forEach(filme => {
                const poster = filme.Poster && filme.Poster !== "N/A" ? filme.Poster : 'https://placeholder.com';
                const imdbID = filme.imdbID;
                const titulo = filme.Title;

                const card = document.createElement('div');
                card.className = 'filme-card';
                
                // Monta o player interno passando o código universal do IMDb retornado pela OMDb
                const urlPlayerInterno = `https://warezcdn.com{imdbID}`;
                card.setAttribute('onclick', `abrirPlayer('${urlPlayerInterno}')`);
                
                card.innerHTML = `
                    <img class="filme-capa" src="${poster}" alt="${titulo}">
                    <div class="filme-info">
                        <div class="filme-titulo">${titulo}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function restaurarCatalogo() {
            document.getElementById('campoBusca').value = "";
            document.getElementById('tituloSecao').innerText = "Filmes Disponíveis";
            carregarFilmesIniciais();
        }

        // 4. Controles do Modal do Player Interno
        function abrirPlayer(linkVideo) {
            document.getElementById('videoPlayer').src = linkVideo;
            document.getElementById('meuModal').style.display = 'flex';
        }

        function fecharPlayer() {
            document.getElementById('videoPlayer').src = '';
            document.getElementById('meuModal').style.display = 'none';
        }

        window.onclick = function(event) {
            let modal = document.getElementById('meuModal');
            if (event.target == modal) { fecharPlayer(); }
        }

        // Inicializa o site puxando dados da OMDb API
        carregarFilmesIniciais();
    </script>
</body>
</html>
