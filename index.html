<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaxxFlixx - Catálogo Pronto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo" onclick="restaurarCatalogo()">MaxxFlixx</div>
        <div class="busca-container">
            <input type="text" id="campoBusca" class="busca-input" placeholder="Pesquisar filme no catálogo..." oninput="filtrarFilmesLocal()">
        </div>
    </header>

    <main class="conteudo">
        <h2 class="secao-titulo" id="tituloSecao">Filmes Disponíveis</h2>
        <div class="grade-filmes" id="catalogo">
            <!-- Gerado instantaneamente pelo JavaScript -->
        </div>
    </main>

    <!-- Modal do Player de Vídeo INTERNO -->
    <div id="meuModal" class="modal">
        <div class="modal-conteudo">
            <button class="fechar-modal" onclick="fecharPlayer()">&times;</button>
            <div class="video-container">
                <!-- Iframe limpo e configurado com as permissões corretas exigidas para reprodução externa -->
                <iframe id="videoPlayer" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        // BANCO DE DADOS LOCAL COM TRAILERS EM ALTA VELOCIDADE (Uso do sistema /embed/)
        const catalogoFilmes = [
            { 
                t: "Deadpool & Wolverine", 
                c: "https://wikimedia.org", 
                urlVideo: "https://youtube.com" 
            },
            { 
                t: "Divertida Mente 2", 
                c: "https://wikimedia.org", 
                urlVideo: "https://youtube.com" 
            },
            { 
                t: "Avatar: O Caminho da Água", 
                c: "https://wikimedia.org", 
                urlVideo: "https://youtube.com" 
            },
            { 
                t: "Homem-Aranha: Sem Volta para Casa", 
                c: "https://wikimedia.org", 
                urlVideo: "https://youtube.com" 
            }
        ];

        function exibirCatalogo(lista) {
            const container = document.getElementById('catalogo');
            container.innerHTML = "";

            if (lista.length === 0) {
                container.innerHTML = "<p style='color:#666; padding: 20px;'>Nenhum filme encontrado.</p>";
                return;
            }

            lista.forEach(filme => {
                const card = document.createElement('div');
                card.className = 'filme-card';
                card.setAttribute('onclick', `abrirPlayer('${filme.urlVideo}')`);
                
                card.innerHTML = `
                    <img class="filme-capa" src="${filme.c}" alt="${filme.t}">
                    <div class="filme-info">
                        <div class="filme-titulo">${filme.t}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filtrarFilmesLocal() {
            const busca = document.getElementById('campoBusca').value.toLowerCase().trim();
            
            if (busca === "") {
                document.getElementById('tituloSecao').innerText = "Filmes Disponíveis";
                exibirCatalogo(catalogoFilmes);
                return;
            }

            document.getElementById('tituloSecao').innerText = `Resultados para: "${busca}"`;
            const filtrados = catalogoFilmes.filter(filme => 
                filme.t.toLowerCase().includes(busca)
            );
            exibirCatalogo(filtrados);
        }

        function restaurarCatalogo() {
            document.getElementById('campoBusca').value = "";
            document.getElementById('tituloSecao').innerText = "Filmes Disponíveis";
            exibirCatalogo(catalogoFilmes);
        }

        function abrirPlayer(linkVideo) {
            document.getElementById('videoPlayer').src = linkVideo;
            document.getElementById('meuModal').style.display = 'flex';
        }

        function fecharPlayer() {
            document.getElementById('videoPlayer').src = '';
            document.getElementById('meuModal').style.display = 'none';
        }

        window.onclick = function(event) {
            let modal = document.getElementById('meuModal');
            if (event.target == modal) { fecharPlayer(); }
        }

        exibirCatalogo(catalogoFilmes);
    </script>
</body>
</html>
