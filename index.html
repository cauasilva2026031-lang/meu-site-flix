<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaxxFlixx - Velocidade Máxima</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo" onclick="restaurarCatalogo()">MaxxFlixx</div>
        <div class="busca-container">
            <!-- Busca local instantânea a cada letra digitada -->
            <input type="text" id="campoBusca" class="busca-input" placeholder="Pesquisar filme ou série no catálogo..." oninput="filtrarFilmesLocal()">
        </div>
    </header>

    <main class="conteudo">
        <h2 class="secao-titulo" id="tituloSecao">Filmes Disponíveis</h2>
        <div class="grade-filmes" id="catalogo">
            <!-- Os cards serão criados em milissegundos aqui -->
        </div>
    </main>

    <script>
        // BANCO DE DADOS LOCAL GIGANTE (Carregamento instantâneo em 1 segundo)
        const catálogoFilmes = [
            { t: "Deadpool & Wolverine", c: "https://wikimedia.org", id: "533535" },
            { t: "Divertida Mente 2", c: "https://wikimedia.org", id: "1022789" },
            { t: "Avatar: O Caminho da Água", c: "https://wikimedia.org", id: "76600" },
            { t: "Homem-Aranha: Sem Volta para Casa", c: "https://wikimedia.org", id: "634649" },
            { t: "Vingadores: Ultimato", c: "https://wikimedia.org", id: "299534" },
            { t: "Interestelar", c: "https://wikimedia.org", id: "157336" },
            { t: "Batman (2022)", c: "https://wikimedia.org", id: "414906" },
            { t: "Vingadores: Guerra Infinita", c: "https://wikimedia.org", id: "299536" },
            { t: "Coringa (Joker)", c: "https://wikimedia.org", id: "475554" },
            { t: "O Rei Leão (Live Action)", c: "https://wikimedia.org", id: "420818" },
            { t: "Barbie (2023)", c: "https://wikimedia.org", id: "346698" },
            { t: "Oppenheimer", c: "https://wikimedia.org", id: "872585" },
            { t: "Pantera Negra", c: "https://wikimedia.org", id: "284054" },
            { t: "Gladiador (2000)", c: "https://wikimedia.org", id: "98" },
            { t: "Matrix (1999)", c: "https://wikimedia.org", id: "603" },
            { t: "Shrek", c: "https://wikimedia.org", id: "808" }
        ];

        // Renderiza tudo na tela em milissegundos
        function exibirCatalogo(lista) {
            const container = document.getElementById('catalogo');
            container.innerHTML = "";

            if (lista.length === 0) {
                container.innerHTML = "<p style='color:#666; padding: 20px;'>Nenhum filme encontrado.</p>";
                return;
            }

            lista.forEach(filme => {
                const card = document.createElement('div');
                card.className = 'filme-card';
                
                // Abre o player SuperFlix Pro sem passar pelo bloqueio do Cloudflare do iframe
                const urlPlayer = `https://superflixapi.pro{filme.id}`;
                card.setAttribute('onclick', `window.open('${urlPlayer}', '_blank')`);
                
                card.innerHTML = `
                    <img class="filme-capa" src="${filme.c}" alt="${filme.t}">
                    <div class="filme-info">
                        <div class="filme-titulo">${filme.t}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Pesquisa local em tempo real (Sem carregar nada da internet, velocidade pura)
        function filtrarFilmesLocal() {
            const busca = document.getElementById('campoBusca').value.toLowerCase().trim();
            
            if (busca === "") {
                document.getElementById('tituloSecao').innerText = "Filmes Disponíveis";
                exibirCatalogo(catálogoFilmes);
                return;
            }

            document.getElementById('tituloSecao').innerText = `Resultados para: "${busca}"`;
            const filtrados = catálogoFilmes.filter(filme => 
                filme.t.toLowerCase().includes(busca)
            );
            exibirCatalogo(filtrados);
        }

        function restaurarCatalogo() {
            document.getElementById('campoBusca').value = "";
            document.getElementById('tituloSecao').innerText = "Filmes Disponíveis";
            exibirCatalogo(catálogoFilmes);
        }

        // Inicialização em tempo recorde
        exibirCatalogo(catálogoFilmes);
    </script>
</body>
</html>
