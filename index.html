<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaxxFlixx - Catálogo Geral Automatizado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo" onclick="carregarCatalogoGlobal()">MaxxFlixx</div>
        <div class="busca-container">
            <!-- Consulta automática global integrada ao indexador unificado -->
            <input type="text" id="campoBusca" class="busca-input" placeholder="Pesquisar qualquer filme ou série do mundo..." oninput="pesquisarFilmeGlobal()">
        </div>
    </header>

    <main class="conteudo">
        <h2 class="secao-titulo" id="tituloSecao">Filmes Populares</h2>
        <div class="grade-filmes" id="catalogo">
            <p style="color: #666; padding: 20px;">Sincronizando banco de dados...</p>
        </div>
    </main>

    <script>
        // Chave e rotas públicas universais de distribuição de catálogo de código aberto
        const CHAVE_PROVEDOR = '69ac222d861d856c5e2d6b3848b6bc16'; 
        const URL_PROVEDOR = 'https://themoviedb.org';
        const ROTA_POSTER = 'https://tmdb.org';

        // 1. Puxa instantaneamente os milhares de filmes mais assistidos do mundo
        async function carregarCatalogoGlobal() {
            document.getElementById('tituloSecao').innerText = "Filmes Populares";
            try {
                const conexao = await fetch(URL_PROVEDOR + "/movie/popular?api_key=" + CHAVE_PROVEDOR + "&language=pt-BR&page=1");
                const dados = await conexao.json();
                renderizarCardsPobreflix(dados.results);
            } catch (erro) {
                console.error("Falha na sincronização de mídia:", erro);
            }
        }

        // 2. Campo de varredura inteligente para qualquer título digitado
        let delayDigitacao = null;
        function pesquisarFilmeGlobal() {
            clearTimeout(delayDigitacao);
            const busca = document.getElementById('campoBusca').value.trim();
            
            if (busca.length === 0) {
                carregarCatalogoGlobal();
                return;
            }

            delayDigitacao = setTimeout(async () => {
                document.getElementById('tituloSecao').innerText = 'Resultados para: "' + busca + '"';
                try {
                    const conexao = await fetch(URL_PROVEDOR + "/search/movie?api_key=" + CHAVE_PROVEDOR + "&language=pt-BR&query=" + encodeURIComponent(busca) + "&page=1");
                    const dados = await conexao.json();
                    renderizarCardsPobreflix(dados.results);
                } catch (erro) {
                    console.error("Falha ao buscar mídias:", erro);
                }
            }, 300);
        }

        // 3. Renderização profissional de cards idêntica aos sites famosos
        function renderizarCardsPobreflix(listaFilmes) {
            const container = document.getElementById('catalogo');
            container.innerHTML = "";

            if (!listaFilmes || listaFilmes.length === 0) {
                container.innerHTML = "<p style='color:#666; padding: 20px;'>Nenhum título localizado.</p>";
                return;
            }

            listaFilmes.forEach(filme => {
                if (!filme.poster_path) return;

                const card = document.createElement('div');
                card.className = 'filme-card';
                
                // Conexão direta com o player master estável da VidSrc (Usado pelas grandes plataformas)
                var linkStreamMaster = "https://vidsrc.me" + filme.id;
                card.setAttribute('onclick', "window.open('" + linkStreamMaster + "', '_blank')");
                
                card.innerHTML = `
                    <img class="filme-capa" src="${ROTA_POSTER + filme.poster_path}" alt="${filme.title}">
                    <div class="filme-info">
                        <div class="filme-titulo">${filme.title}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Inicialização em tempo recorde
        carregarCatalogoGlobal();
    </script>
</body>
</html>
