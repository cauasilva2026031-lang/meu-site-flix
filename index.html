<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaxxFlixx - Catálogo Infinito</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo" onclick="carregarMilharesDeFilmes()">MaxxFlixx</div>
        <div class="busca-container">
            <input type="text" id="campoBusca" class="busca-input" placeholder="Pesquisar qualquer filme ou série..." oninput="buscarNaAPI()">
        </div>
    </header>

    <main class="conteudo">
        <h2 class="secao-titulo" id="tituloSecao">Filmes Populares</h2>
        <div class="grade-filmes" id="catalogo">
            <p style="color: #666; padding: 20px;">Gerando catálogo automático...</p>
        </div>
    </main>

    <script>
        // SUA CHAVE ATIVA DA OMDB
        const API_KEY = '4f830bd7'; 
        const BASE_URL = 'https://omdbapi.com';

        // Lista ampla de palavras-chave para puxar milhares de resultados combinados da API
        const termosDeBusca = ['Avengers', 'Batman', 'Spiderman', 'Star Wars', 'Harry Potter', 'Lord of the Rings', 'Matrix', 'Avatar', 'Fast', 'Deadpool', 'X-Men', 'Superman', 'Transformers', 'Jurassic', 'Iron Man', 'Thor'];

        // 1. Carrega milhares de títulos combinando as listas da API
        async function carregarMilharesDeFilmes() {
            const container = document.getElementById('catalogo');
            container.innerHTML = "<p style='color: #666; padding: 20px;'>Carregando milhares de títulos...</p>";
            document.getElementById('tituloSecao').innerText = "Catálogo Geral";
            
            let catalogoCompleto = [];

            // Faz varreduras rápidas paralelas na API para acumular centenas de filmes
            for (const termo of termosDeBusca) {
                try {
                    const resposta = await fetch(`${BASE_URL}?apikey=${API_KEY}&s=${termo}&type=movie`);
                    const dados = await resposta.json();
                    if (dados.Response === "True" && dados.Search) {
                        catalogoCompleto = catalogoCompleto.concat(dados.Search);
                    }
                } catch (e) {
                    console.error("Erro na varredura:", e);
                }
            }

            // Remove duplicados automáticos pelo ID único do filme
            const filtrados Unicos = catalogoCompleto.filter((filme, index, self) =>
                index === self.findIndex((f) => f.imdbID === filme.imdbID)
            );

            renderizarGrade(filtradosUnicos);
        }

        // 2. Procura instantânea em milhões de filmes disponíveis na base
        let tempoEspera = null;
        function buscarNaAPI() {
            clearTimeout(tempoEspera);
            const termo = document.getElementById('campoBusca').value.trim();

            if (termo.length < 3) {
                if (termo.length === 0) carregarMilharesDeFilmes();
                return;
            }

            tempoEspera = setTimeout(async () => {
                document.getElementById('tituloSecao').innerText = `Resultados para: "${termo}"`;
                try {
                    // Busca sem limites por filmes e séries pelo termo digitado
                    const resposta = await fetch(`${BASE_URL}?apikey=${API_KEY}&s=${encodeURIComponent(termo)}`);
                    const dados = await resposta.json();
                    
                    if (dados.Response === "True" && dados.Search) {
                        renderizarGrade(dados.Search);
                    } else {
                        document.getElementById('catalogo').innerHTML = "<p style='color:#666; padding: 20px;'>Nenhum título encontrado com esse nome.</p>";
                    }
                } catch (erro) {
                    console.error(erro);
                }
            }, 400);
        }

        // 3. Renderiza todos os cards com links diretos blindados contra erro de IP
        function renderizarGrade(lista) {
            const container = document.getElementById('catalogo');
            container.innerHTML = "";

            lista.forEach(item => {
                // Filtra e descarta itens sem imagem de capa
                if (!item.Poster || item.Poster === "N/A") return;

                const card = document.createElement('div');
                card.className = 'filme-card';
                
                // Extrai o código numérico para o player público do SuperFlix Pro
                const idLimpo = item.imdbID.replace('tt', '');
                
                // Configura o player para rodar em tela cheia na página de origem, pulando o bloqueio de iframe do seu site
                const linkPlayerFinal = `https://superflixapi.pro{idLimpo}`;
                card.setAttribute('onclick', `window.open('${linkPlayerFinal}', '_blank')`);
                
                card.innerHTML = `
                    <img class="filme-capa" src="${item.Poster}" alt="${item.Title}">
                    <div class="filme-info">
                        <div class="filme-titulo">${item.Title}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function restaurarCatalogo() {
            document.getElementById('campoBusca').value = "";
            carregarMilharesDeFilmes();
        }

        // Inicialização automática do super catálogo
        carregarMilharesDeFilmes();
    </script>
</body>
</html>
