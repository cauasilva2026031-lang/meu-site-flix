<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaxxFlixx - Catálogo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo" onclick="restaurarCatalogo()">MaxxFlixx</div>
        <div class="busca-container">
            <input type="text" id="campoBusca" class="busca-input" placeholder="Pesquisar filme no catálogo..." oninput="filtrarFilmes()">
        </div>
    </header>

    <main class="conteudo">
        <h2 class="secao-titulo" id="tituloSecao">Filmes Disponíveis</h2>
        <div class="grade-filmes" id="catalogo">
            <!-- Gerado de forma imediata pelo navegador -->
        </div>
    </main>

    <!-- Modal do Player de Vídeo INTERNO -->
    <div id="meuModal" class="modal">
        <div class="modal-conteudo">
            <button class="fechar-modal" onclick="fecharPlayer()">&times;</button>
            <div class="video-container">
                <!-- Sandbox que autoriza a reprodução interna e segura pop-ups de vírus -->
                <iframe id="videoPlayer" src="" scrolling="no" frameborder="0" allowfullscreen allow="autoplay; encrypted-media" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
            </div>
        </div>
    </div>

    <script>
        // BANCO DE DADOS LOCAL BLINDADO (Sem chamadas de APIs externas)
        const meusFilmes = [
            {
                titulo: "Deadpool & Wolverine",
                capa: "https://wikimedia.org",
                video: "https://warezcdn.com"
            },
            {
                titulo: "Divertida Mente 2",
                capa: "https://wikimedia.org",
                video: "https://warezcdn.com"
            },
            {
                titulo: "Avatar: O Caminho da Água",
                capa: "https://wikimedia.org",
                video: "https://warezcdn.com"
            },
            {
                titulo: "Homem-Aranha: Sem Volta para Casa",
                capa: "https://wikimedia.org",
                video: "https://warezcdn.com"
            },
            {
                titulo: "Vingadores: Ultimato",
                capa: "https://wikimedia.org",
                video: "https://warezcdn.com"
            },
            {
                titulo: "Interestelar",
                capa: "https://wikimedia.org",
                video: "https://warezcdn.com"
            }
        ];

        function carregarCatalogo(listaDeFilmes) {
            const container = document.getElementById('catalogo');
            container.innerHTML = "";

            if (listaDeFilmes.length === 0) {
                container.innerHTML = "<p style='color:#666; padding: 20px;'>Nenhum filme encontrado com esse nome.</p>";
                return;
            }

            listaDeFilmes.forEach(filme => {
                const card = document.createElement('div');
                card.className = 'filme-card';
                card.setAttribute('onclick', `abrirPlayer('${filme.video}')`);
                card.innerHTML = `
                    <img class="filme-capa" src="${filme.capa}" alt="${filme.titulo}">
                    <div class="filme-info">
                        <div class="filme-titulo">${filme.titulo}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filtrarFilmes() {
            const termoBusca = document.getElementById('campoBusca').value.toLowerCase().trim();
            if(termoBusca === "") {
                document.getElementById('tituloSecao').innerText = "Filmes Disponíveis";
                carregarCatalogo(meusFilmes);
                return;
            }
            
            document.getElementById('tituloSecao').innerText = `Resultados para: "${termoBusca}"`;
            const filmesFiltrados = meusFilmes.filter(filme => 
                filme.titulo.toLowerCase().includes(termoBusca)
            );
            carregarCatalogo(filmesFiltrados);
        }

        function restaurarCatalogo() {
            document.getElementById('campoBusca').value = "";
            document.getElementById('tituloSecao').innerText = "Filmes Disponíveis";
            carregarCatalogo(meusFilmes);
        }

        function abrirPlayer(linkVideo) {
            document.getElementById('videoPlayer').src = linkVideo;
            document.getElementById('meuModal').style.display = 'flex';
        }

        function fecharPlayer() {
            document.getElementById('videoPlayer').src = '';
            document.getElementById('meuModal').style.display = 'none';
        }

        window.onclick = function(event) {
            let modal = document.getElementById('meuModal');
            if (event.target == modal) { fecharPlayer(); }
        }

        // Executa imediatamente o catálogo guardado localmente
        carregarCatalogo(meusFilmes);
    </script>
</body>
</html>
